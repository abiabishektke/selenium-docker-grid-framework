# ========================
# SPARK REPORT
# ========================
extent.reporter.spark.start=true
extent.reporter.spark.out=ExtentReports/SparkReport/Spark.html
extent.reporter.spark.config=src/test/resources/spark-config.xml

extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log
extent.reporter.spark.timelineEnabled=true
extent.reporter.spark.enableTimeline=true
extent.reporter.spark.offlineMode=true
extent.reporter.spark.encoding=UTF-8

# ========================
# PDF REPORT
# ========================
extent.reporter.pdf.start=true
extent.reporter.pdf.out=ExtentReports/PdfReport/ExtentPdf.pdf

# ========================
# HTML REPORT (Optional Backup)
# ========================
extent.reporter.html.start=true
extent.reporter.html.out=ExtentReports/HtmlReport/ExtentHtml.html

# ========================
# JSON REPORT (CI/CD USE)
# ========================
extent.reporter.json.start=true
extent.reporter.json.out=ExtentReports/JsonReport/Extent.json

# ========================
# BDD REPORT (If using Cucumber)
# ========================
extent.reporter.bdd.start=false
extent.reporter.bdd.out=ExtentReports/BddReport/Bdd.html

# ========================
# BASE FOLDER (Dynamic per run)
# ========================
basefolder.name=ExtentReports/Run_
basefolder.datetimepattern=d_MMM_yyyy_HH_mm_ss

# ========================
# SYSTEM INFORMATION
# ========================
systeminfo.os=Windows
systeminfo.user=Abhishek
systeminfo.build=1.0
systeminfo.AppName=Hybrid Automation Framework
systeminfo.Module=UI Testing
systeminfo.SubModule=Regression
systeminfo.Tester=Abhishek
systeminfo.Environment=QA
systeminfo.Java.Version=17
systeminfo.Selenium.Version=4.x

# ========================
# SCREENSHOT SETTINGS
# ========================
screenshot.dir=Screenshots/
screenshot.rel.path=../Screenshots/

# ========================
# LOGGING
# ========================
extent.reporter.spark.log.level=INFO

# ========================
# AUTO SCREENSHOT PATH HANDLING
# ========================
extent.reporter.spark.autoCreateRelativePathMedia=true